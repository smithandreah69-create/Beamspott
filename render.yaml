services:
  - type: web
    name: beamspot-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: beamspot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FLUTTERWAVE_WEBHOOK_SECRET
        sync: false

databases:
  - name: beamspot-db
    plan: free
